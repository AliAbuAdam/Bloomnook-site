name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # позволяет запускать деплой вручную из вкладки Actions

# Права, необходимые для публикации на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем только один деплой за раз; новый отменяет предыдущий
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Подстраховка: если в next.config.mjs ещё нет output:"export" —
      # подменяем конфиг на CI-раннере (на твою рабочую копию не влияет).
      - name: Ensure static-export config
        run: |
          if ! grep -q 'output' next.config.mjs; then
            echo "Patching next.config.mjs for static export on CI"
            cat > next.config.mjs <<'EOF'
          /** @type {import('next').NextConfig} */
          const basePath = process.env.PAGES_BASE_PATH || "";
          const nextConfig = {
            reactStrictMode: true,
            output: "export",
            images: { unoptimized: true },
            trailingSlash: true,
            basePath,
            assetPrefix: basePath ? basePath + "/" : undefined,
          };
          export default nextConfig;
          EOF
          fi

      - name: Build (static export)
        env:
          # Сайт отдаётся по адресу <user>.github.io/<repo>/, поэтому
          # basePath = "/<repo>" (обязательно с ведущим слэшем).
          # Custom domain (bloomnook.ru): basePath пустой, сайт в корне домена.
          PAGES_BASE_PATH: ""
          # Адрес API PocketBase. Задать как Variable репозитория:
          # Settings → Secrets and variables → Actions → вкладка Variables →
          # NEXT_PUBLIC_PB_URL = https://api.bloomnook.ru
          NEXT_PUBLIC_PB_URL: ${{ vars.NEXT_PUBLIC_PB_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
